<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f9d62">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="스터디플로우">
    <title>내 정보 수정 | StudyFlow</title>
    <script src="./theme.js"></script>
    <script defer src="./pwa-register.js"></script>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/studyflow-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="profile-page">
    <div class="profile-page-shell">
      <header class="profile-page-head">
        <div class="profile-title-row">
          <a class="profile-title-back" href="./index.html" aria-label="스터디플로우로 돌아가기">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M15 18 9 12l6-6"></path>
            </svg>
          </a>
          <h1>내 정보 수정</h1>
        </div>
      </header>

      <main class="profile-edit-layout">
        <section class="profile-edit-section" aria-label="기본 정보">
          <h2>기본 정보</h2>
          <form class="profile-edit-form" id="profilePageForm">
            <label>
              <span>이름</span>
              <input id="profilePageName" required placeholder="학습 관리자">
            </label>
            <label>
              <span>이메일</span>
              <input id="profilePageEmail" type="email" readonly placeholder="manager@example.com">
            </label>
            <label>
              <span>휴대폰</span>
              <input id="profilePagePhone" type="tel" placeholder="010-0000-0000">
            </label>
            <div class="profile-phone-verification" id="profilePhoneVerification" hidden>
              <button type="button" id="profilePhoneCodeSend">인증번호 받기</button>
              <div class="profile-phone-code-fields" id="profilePhoneCodeFields" hidden>
                <label>
                  <span>인증번호</span>
                  <input id="profilePhoneCode" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6자리 인증번호">
                </label>
                <button type="button" id="profilePhoneCodeVerify">인증하기</button>
              </div>
              <p class="profile-phone-help" id="profilePhoneHelp">휴대폰 번호를 변경하려면 새 번호 인증이 필요합니다.</p>
            </div>
            <label>
              <span>비밀번호 변경</span>
              <input id="profilePagePassword" type="password" autocomplete="new-password" placeholder="새 비밀번호">
            </label>
            <label class="marketing-check">
              <input id="profileMarketingConsent" type="checkbox">
              <span>마케팅 수신 동의</span>
            </label>
            <div class="profile-edit-actions">
              <button type="submit">저장</button>
            </div>
          </form>
        </section>
      </main>
    </div>
    <div class="profile-toast" id="profileToast" role="status" aria-live="polite"></div>

    <script src="./profile.js"></script>
  </body>
</html>
