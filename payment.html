<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f9d62">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="스터디플로우">
    <title>결제 현황 | StudyFlow</title>
    <script src="./theme.js"></script>
    <script defer src="./pwa-register.js"></script>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/studyflow-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="profile-page payment-page">
    <div class="profile-page-shell">
      <header class="profile-page-head">
        <div class="profile-title-row">
          <a class="profile-title-back" href="./index.html" aria-label="스터디플로우로 돌아가기">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M15 18 9 12l6-6"></path>
            </svg>
          </a>
          <h1>결제 현황</h1>
        </div>
      </header>

      <main class="profile-edit-layout payment-page-layout">
        <section class="profile-edit-section payment-history-section" aria-label="결제 현황">
          <div class="payment-history-head">
            <h2>최근 결제</h2>
            <div class="payment-history-actions">
              <button class="ghost" type="button" id="refreshPaymentOrders">새로고침</button>
              <button type="button" id="refundLatestPayment" disabled>환불</button>
            </div>
          </div>
          <div class="payment-order-list" id="paymentOrderList"></div>
        </section>
      </main>
    </div>

    <dialog id="refundPreviewDialog" class="refund-preview-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">환불</p>
            <h3>환불 내용을 확인하세요</h3>
          </div>
          <button class="icon-btn" value="cancel" type="submit" formnovalidate aria-label="닫기">×</button>
        </div>
        <div class="refund-preview-summary">
          <div id="refundPreviewItems" class="refund-preview-items"></div>
          <div>
            <span>환불 금액</span>
            <strong id="refundPreviewAmount">-</strong>
          </div>
          <div>
            <span>현재 이용 종료일</span>
            <strong id="refundPreviewCurrentEnd">-</strong>
          </div>
          <div>
            <span>환불 후 이용 종료일</span>
            <strong id="refundPreviewAfterEnd">-</strong>
          </div>
        </div>
        <p class="refund-preview-note">남은 이용기간의 최신 결제 건부터 역순으로 환불합니다.</p>
        <div class="dialog-actions">
          <button class="ghost" value="cancel" type="submit" formnovalidate>취소</button>
          <button class="danger" id="confirmRefundPayment" value="confirm" type="submit">환불 진행</button>
        </div>
      </form>
    </dialog>

    <div class="profile-toast" id="paymentToast" role="status" aria-live="polite"></div>

    <script src="./payment.js"></script>
  </body>
</html>
